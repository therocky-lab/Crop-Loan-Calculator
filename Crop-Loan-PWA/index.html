<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Loan Calculator</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:Arial,sans-serif;margin:20px;background:#f4f4f4}
table{border-collapse:collapse;width:100%;background:#fff}
th,td{border:1px solid #000;padding:8px;text-align:center}
input{width:90%}
</style>
</head>
<body>
<h2>Crop Loan Calculator 2025-26</h2>
<table>
<tr><th>Crop</th><th>Acre</th><th>Hector</th><th>Rate</th><th>Total</th></tr>
<tr><td>धान</td><td><input id="a1" type="number" oninput="calc()"></td><td id="h1">0</td><td>27200</td><td id="t1">0</td></tr>
<tr><td>कापूस</td><td><input id="a2" type="number" oninput="calc()"></td><td id="h2">0</td><td>29000</td><td id="t2">0</td></tr>
</table>
<script>
function calc(){
let a1=parseFloat(document.getElementById('a1').value)||0;
let a2=parseFloat(document.getElementById('a2').value)||0;
document.getElementById('h1').innerText=(a1*0.404686).toFixed(2);
document.getElementById('h2').innerText=(a2*0.404686).toFixed(2);
document.getElementById('t1').innerText=(a1*27200).toFixed(0);
document.getElementById('t2').innerText=(a2*29000).toFixed(0);
}
</script>
</body>
</html>
