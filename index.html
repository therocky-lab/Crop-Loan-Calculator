<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crop Loan Calculator 2025-26</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="theme-color" content="#1f6f2e">

<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f4f4f4;
}

h2{
    text-align:center;
}

table{
    border-collapse:collapse;
    width:100%;
    margin-bottom:20px;
    background:white;
}

th,td{
    border:1px solid #000;
    padding:8px;
    text-align:center;
}

input{
    width:90%;
    padding:5px;
    text-align:center;
    font-size:16px;
}

.total{
    background:#ff5c5c;
    color:white;
    font-weight:bold;
}

.orange{
    background:#f4a742;
}
</style>
</head>

<body>

<div style="text-align:center; margin-bottom:10px;">
    <img src="logo.png" alt="Crop Loan Calculator Logo" width="180">
</div>

<h2>Crop Loan Calculator 2025-26</h2>

<table>
<tr>
    <th>Crop</th>
    <th>Acre</th>
    <th>Hectare</th>
</tr>

<tr>
    <td>धान</td>
    <td><input type="number" step="0.01" id="acre1" oninput="calculate()"></td>
    <td id="hector1">0.00</td>
</tr>

<tr>
    <td>कापूस</td>
    <td><input type="number" step="0.01" id="acre2" oninput="calculate()"></td>
    <td id="hector2">0.00</td>
</tr>

<tr>
    <td>मिरची</td>
    <td><input type="number" step="0.01" id="acre3" oninput="calculate()"></td>
    <td id="hector3">0.00</td>
</tr>

<tr class="total">
    <td>एकूण</td>
    <td id="totalAcre">0.00</td>
    <td id="totalHector">0.00</td>
</tr>
</table>

<table>
<tr>
    <th>Crop</th>
    <th>Rate</th>
    <th>Acre</th>
    <th>Total ₹</th>
</tr>

<tr>
    <td>धान</td>
    <td>27200</td>
    <td id="loanAcre1">0.00</td>
    <td id="loanTotal1">0</td>
</tr>

<tr>
    <td>कापूस</td>
    <td>29000</td>
    <td id="loanAcre2">0.00</td>
    <td id="loanTotal2">0</td>
</tr>

<tr>
    <td>मिरची</td>
    <td>48000</td>
    <td id="loanAcre3">0.00</td>
    <td id="loanTotal3">0</td>
</tr>

<tr class="orange">
    <td colspan="2"><b>एकूण</b></td>
    <td id="loanTotalAcre">0.00</td>
    <td id="grandTotal">0</td>
</tr>
</table>
<div style="text-align:center; margin:20px 0;">
<button onclick="clearAll()"
style="
background:red;
color:white;
font-size:18px;
padding:12px 25px;
border:none;
border-radius:8px;
font-weight:bold;">
🗑 Clear All
</button>
</div>
<script>
function calculate(){

let acre1=parseFloat(document.getElementById('acre1').value)||0;
let acre2=parseFloat(document.getElementById('acre2').value)||0;
let acre3=parseFloat(document.getElementById('acre3').value)||0;

let h1=acre1/2.5;
let h2=acre2/2.5;
let h3=acre3/2.5;

document.getElementById('hector1').innerHTML=h1.toFixed(2);
document.getElementById('hector2').innerHTML=h2.toFixed(2);
document.getElementById('hector3').innerHTML=h3.toFixed(2);

let totalAcre=acre1+acre2+acre3;
let totalHector=h1+h2+h3;

document.getElementById('totalAcre').innerHTML=totalAcre.toFixed(2);
document.getElementById('totalHector').innerHTML=totalHector.toFixed(2);

document.getElementById('loanAcre1').innerHTML=acre1.toFixed(2);
document.getElementById('loanAcre2').innerHTML=acre2.toFixed(2);
document.getElementById('loanAcre3').innerHTML=acre3.toFixed(2);

let total1=acre1*27200;
let total2=acre2*29000;
let total3=acre3*48000;

document.getElementById('loanTotal1').innerHTML=total1.toLocaleString('en-IN');
document.getElementById('loanTotal2').innerHTML=total2.toLocaleString('en-IN');
document.getElementById('loanTotal3').innerHTML=total3.toLocaleString('en-IN');

let grand=total1+total2+total3;

document.getElementById('loanTotalAcre').innerHTML=totalAcre.toFixed(2);
document.getElementById('grandTotal').innerHTML=grand.toLocaleString('en-IN');
}
function clearAll(){

document.getElementById('acre1').value='';
document.getElementById('acre2').value='';
document.getElementById('acre3').value='';

document.getElementById('hector1').innerHTML='0.00';
document.getElementById('hector2').innerHTML='0.00';
document.getElementById('hector3').innerHTML='0.00';

document.getElementById('totalAcre').innerHTML='0.00';
document.getElementById('totalHector').innerHTML='0.00';

document.getElementById('loanAcre1').innerHTML='0.00';
document.getElementById('loanAcre2').innerHTML='0.00';
document.getElementById('loanAcre3').innerHTML='0.00';

document.getElementById('loanTotal1').innerHTML='0';
document.getElementById('loanTotal2').innerHTML='0';
document.getElementById('loanTotal3').innerHTML='0';

document.getElementById('loanTotalAcre').innerHTML='0.00';
document.getElementById('grandTotal').innerHTML='0';

}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
<h3 style="color:red;text-align:center;">
TEST BUTTON
</h3>
<footer style="text-align:center;margin-top:20px;padding:10px;font-size:14px;color:#555;font-weight:bold;">
© 2026 RZ_Homer. All Rights Reserved.
</footer>

</body>
</html>
